<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        .radar-iamobil {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .radar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .radar-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .trend-item {
            margin-bottom: 16px;
        }
        .trend-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            border-radius: 4px;
            transition: width 1s ease-out;
        }
        .radar-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

<div class="radar-iamobil">
    <div class="radar-header">
        <div class="pulse"></div>
        <span class="radar-title">Radar iAmobil</span>
    </div>
    
    <div id="radar-content">
        <p style="color: #64748b; font-size: 0.875rem;">Sincronizando com o cérebro da imobiliária...</p>
    </div>

    <div class="radar-footer">
        Atualizado agora mesmo • Inteligência Artificial
    </div>
</div>

<script>
    async function updateRadar() {
        try {
            // Em produção, troque 'localhost' pelo seu IP público ou domínio
            const response = await fetch('http://localhost:3000/radar_data.json');
            const data = await response.json();
            
            let html = '';
            
            // Regiões
            html += '<div style="margin-bottom: 24px;">';
            data.top_regions.forEach(r => {
                html += `
                    <div class="trend-item">
                        <div class="trend-label">
                            <span>${r.name}</span>
                            <span>${r.score}% procura</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${r.score}%"></div></div>
                    </div>
                `;
            });
            html += '</div>';

            // Insights
            html += `<p style="font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; font-style: italic;">
                "${data.market_vibe}"
            </p>`;

            document.getElementById('radar-content').innerHTML = html;
        } catch (err) {
            console.error('Falha ao sincronizar Radar:', err);
            document.getElementById('radar-content').innerHTML = '<p style="color: #ef4444; font-size: 0.875rem;">Servidor iAmobil Offline</p>';
        }
    }

    updateRadar();
</script>

</body>
</html>
